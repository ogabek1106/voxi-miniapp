<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="stylesheet" href="js/user_reading/ui/passage_view.css">
  <link rel="stylesheet" href="js/user_reading/ui/question_base.css">
  <link rel="stylesheet" href="js/user_reading/ui/result_view.css">
  <link rel="stylesheet" href="js/user_reading/question_types/gap.css">
  <link rel="stylesheet" href="js/user_reading/question_types/tfng.css">
  <link rel="stylesheet" href="js/user_reading/question_types/matching.css">
  <link rel="stylesheet" href="js/user_reading/question_types/summary.css">

  <title>Voxi Mini App</title>
  
  <style>
  html, body {
    width: 100%;
    min-height: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overscroll-behavior: none;
    background: #F5F9FC !important;
  }

  :root {
    --bg-color: #ffffff;
    --text-color: #000000;
    --card-bg: #f4f4f6;
    --border-color: #e5e5ea;
    --primary: #4f46e5;
  }

  body {
    display: block;
    overflow: hidden;
    font-family: Nunito, Manrope, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #F5F9FC !important;
    color: #17212B;
  }

  .app {
    min-height: 100vh;
    height: 100%;
    width: 100%;
    max-width: 100%;
    display: flex;
    flex-direction: column;
    touch-action: manipulation;
    background: #F5F9FC !important;
  }

  .container {
    width: 100%;
    max-width: 320px;
    height: 100%;
    text-align: center;
    display: flex;
    flex-direction: column;
    margin: 0 auto;
    box-sizing: border-box;
  }

  .content {
    flex: 1;
    width: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px;
    box-sizing: border-box;
    background: #F5F9FC !important;
  }

  #content {
    background: #F5F9FC !important;
  }

  input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    outline: none;
    margin-top: 10px;
    box-sizing: border-box;
  }

  button {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    font-size: 16px;
    font-weight: 800;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    background: #00BAFF;
    color: #ffffff;
    box-shadow: 0 8px 24px rgba(20,40,60,0.08);
    box-sizing: border-box;
  }

  .primary-btn {
    margin-top: 12px;
    height: 52px;
    font-size: 15px;
    font-weight: 900;
    border-radius: 20px;
    background: #ffffff;
    color: #17212B;
    border: none;
    box-shadow: 0 8px 24px rgba(20,40,60,0.08);
  }

  #status {
    margin-top: 12px;
    font-size: 14px;
    opacity: 0.85;
  }

  .form {
    width: 100%;
    max-width: 320px;
    margin: 0 auto;
  }

  .bottom-nav {
    height: 56px;
    display: flex;
    align-items: center;
    border-top: 1px solid rgba(20,40,60,0.08);
    box-shadow: 0 -4px 14px rgba(20,40,60,0.05);
    background: #FFFFFF !important;
  }

  .nav-btn {
    flex: 1;
    height: 100%;
    border: none;
    background: transparent;
    color: #8A98A6;
    font-size: 18px;
    margin: 0;
    padding: 0;
  }

  .nav-btn.active {
    color: #00BAFF;
  }

  .divider {
    width: 1px;
    height: 60%;
    background: rgba(20,40,60,0.08);
  }

  .nav-icon {
    width: 22px;
    height: 22px;
    opacity: 0.7;
    transition: opacity 0.15s ease, transform 0.15s ease;
  }

  .nav-btn.active .nav-icon {
    opacity: 1;
    transform: scale(1.1);
  }

  #screen-home {
    margin: 0;
    padding: 0 14px 14px;
    background: #F5F9FC !important;
    box-sizing: border-box;
    min-height: 100%;
  }

  #screen-home .home-shell {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
    font-family: Nunito, Manrope, system-ui, -apple-system, "Segoe UI", sans-serif;
    color: #17212B;
  }

  #screen-home .home-header {
    height: 72px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 0;
  }

  #screen-home .home-user {
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #screen-home .home-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(0,186,255,0.10);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 24px rgba(20,40,60,0.08);
  }

  #screen-home .home-avatar svg {
    width: 20px;
    height: 20px;
    color: #00BAFF;
  }

  #screen-home .home-user-text {
    min-width: 0;
    text-align: left;
  }

  #screen-home .home-user-name {
    margin: 0;
    font-size: 15px;
    font-weight: 800;
    color: #17212B;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #screen-home .home-user-level {
    margin-top: 2px;
    font-size: 11px;
    font-weight: 700;
    color: #607080;
  }

  #screen-home .home-balance {
    min-width: 92px;
    height: 42px;
    border-radius: 18px;
    background: #FFFFFF;
    box-shadow: 0 8px 24px rgba(20,40,60,0.08);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #17212B;
    font-size: 15px;
    font-weight: 800;
    padding: 10px 14px;
    transition: transform 180ms ease, box-shadow 180ms ease;
  }

  #screen-home .home-balance.is-growing {
    transform: translateY(-1px) scale(1.03);
    box-shadow: 0 12px 30px rgba(0,186,255,0.18);
  }

  .vcoin-icon {
    display: inline-block;
    width: 20px;
    height: 20px;
    object-fit: contain;
    flex: 0 0 auto;
  }

  #screen-home .home-balance .vcoin-icon {
    width: 22px;
    height: 22px;
  }

  #screen-profile {
    margin: 0 auto;
    padding: 8px 14px 16px;
    background: #F5F9FC !important;
    box-sizing: border-box;
    min-height: 100%;
    max-width: 420px;
    text-align: left;
  }

  #screen-profile .profile-shell {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 13px;
    font-family: Nunito, Manrope, system-ui, -apple-system, "Segoe UI", sans-serif;
    color: #17212B;
  }

  #screen-profile .profile-page-header {
    padding: 4px 2px 0;
  }

  #screen-profile .profile-page-title {
    margin: 0;
    color: #17212B;
    font-size: 24px;
    font-weight: 900;
    line-height: 1.15;
  }

  #screen-profile .profile-page-subtitle {
    margin-top: 5px;
    color: #607080;
    font-size: 13px;
    font-weight: 800;
    line-height: 1.25;
  }

  #screen-profile .profile-card {
    width: 100%;
    box-sizing: border-box;
    border-radius: 22px;
    background: #FFFFFF;
    box-shadow: 0 8px 24px rgba(20,40,60,0.08);
    padding: 16px;
  }

  #screen-profile .profile-vcoin-card {
    display: grid;
    grid-template-columns: 46px minmax(0, 1fr) auto;
    align-items: center;
    gap: 12px;
  }

  #screen-profile .profile-summary-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 10px;
    padding: 18px 16px 16px;
  }

  #screen-profile .profile-avatar,
  #screen-profile .profile-icon-box {
    width: 46px;
    height: 46px;
    border-radius: 16px;
    background: rgba(0,186,255,0.12);
    color: #00BAFF;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  #screen-profile .profile-avatar {
    width: 58px;
    height: 58px;
    border-radius: 50%;
  }

  #screen-profile .profile-avatar svg {
    width: 27px;
    height: 27px;
  }

  #screen-profile .profile-chevron {
    width: 20px;
    height: 20px;
  }

  #screen-profile .profile-name,
  #screen-profile .profile-card-title {
    margin: 0;
    color: #17212B;
    font-size: 17px;
    font-weight: 900;
    line-height: 1.2;
  }

  #screen-profile .profile-name {
    font-size: 22px;
  }

  #screen-profile .profile-card-subtitle,
  #screen-profile .profile-row-subtitle {
    margin-top: 4px;
    color: #607080;
    font-size: 13px;
    font-weight: 800;
    line-height: 1.25;
  }

  #screen-profile .profile-level-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 26px;
    padding: 0 12px;
    border-radius: 999px;
    background: rgba(0,186,255,0.12);
    color: #00A6E6;
    font-size: 12px;
    font-weight: 900;
    line-height: 1;
  }

  #screen-profile .profile-edit-btn {
    width: auto;
    height: 30px;
    margin: 2px 0 0;
    padding: 0 10px;
    border-radius: 999px;
    background: #F5F9FC;
    color: #607080;
    box-shadow: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 900;
  }

  #screen-profile .profile-edit-btn svg {
    width: 14px;
    height: 14px;
  }

  #screen-profile .profile-stat-row {
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-top: 2px;
  }

  #screen-profile .profile-stat-chip {
    min-height: 32px;
    padding: 0 11px;
    border-radius: 999px;
    background: #F5F9FC;
    color: #607080;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 900;
    line-height: 1;
  }

  #screen-profile .profile-stat-chip strong {
    color: #17212B;
    font-weight: 900;
  }

  #screen-profile .profile-vcoin-card {
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  #screen-profile .profile-vcoin-card .vcoin-icon {
    width: 28px;
    height: 28px;
  }

  #screen-profile .profile-chevron {
    color: #8A98A6;
  }

  #screen-profile .profile-activity-title {
    margin: 0 0 12px;
    color: #17212B;
    font-size: 17px;
    font-weight: 900;
    line-height: 1.2;
  }

  #screen-profile .profile-activity-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #screen-profile .profile-activity-row {
    width: 100%;
    margin: 0;
    padding: 12px;
    border-radius: 16px;
    background: #F5F9FC;
    color: #17212B;
    box-shadow: none;
    text-align: left;
    cursor: pointer;
  }

  #screen-profile .profile-row-title {
    font-size: 14px;
    font-weight: 900;
    line-height: 1.25;
  }

  #screen-profile .profile-result-line {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-top: 10px;
    color: #17212B;
    font-size: 13px;
    font-weight: 900;
  }

  #screen-profile .profile-activity-heading {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  #screen-profile .profile-reading-icon {
    width: 34px;
    height: 34px;
    border-radius: 13px;
    background: rgba(0,186,255,0.12);
    color: #00BAFF;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
  }

  #screen-profile .profile-reading-icon svg {
    width: 18px;
    height: 18px;
  }

  #screen-home .home-announcement {
    height: 50px;
    border-radius: 20px;
    background: rgba(0,186,255,0.06);
    box-shadow: 0 8px 24px rgba(20,40,60,0.06);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 14px;
    color: #607080;
    font-size: 14px;
    font-weight: 800;
    text-align: left;
  }

  #screen-home .home-announcement svg {
    width: 16px;
    height: 16px;
    color: #00BAFF;
    flex: 0 0 auto;
  }

  #screen-home .home-announcement.has-image {
    height: auto;
    padding: 8px;
    align-items: stretch;
  }

  #screen-home .announcement-media {
    width: 100%;
    display: none;
    border-radius: 16px;
    overflow: hidden;
    box-sizing: border-box;
  }

  #screen-home .home-announcement.has-image .announcement-media {
    display: block;
  }

  #screen-home .announcement-image {
    display: block;
    width: 100%;
    height: auto;
    max-height: 240px;
    object-fit: contain;
    border-radius: 16px;
    background: rgba(0, 186, 255, 0.04);
  }

  #screen-home .announcement-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    min-height: 34px;
  }

  #screen-home .home-announcement.has-image .announcement-row {
    margin-top: 8px;
    padding: 0 6px 2px;
  }

  #screen-home .announcement-text {
    font-size: 14px;
    font-weight: 800;
    color: #607080;
    line-height: 1.2;
    text-align: left;
  }

  #screen-home .home-cards {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  #screen-home .home-card {
    --x: 50%;
    --y: 50%;
    position: relative;
    overflow: hidden;
    border-radius: 24px;
    background: #FFFFFF;
    border: none;
    box-shadow: 0 8px 24px rgba(20,40,60,0.08);
    padding: 18px;
    text-align: left;
    cursor: pointer;
    transition: transform 220ms ease, box-shadow 220ms ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    isolation: isolate;
  }

  #screen-home .home-card::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle 88px at var(--x) var(--y), rgba(0,186,255,0.44) 0%, rgba(0,186,255,0.30) 34%, rgba(0,186,255,0.16) 58%, transparent 76%),
      radial-gradient(circle 190px at var(--x) var(--y), rgba(0,186,255,0.18) 0%, rgba(0,186,255,0.10) 44%, transparent 78%);
    opacity: 0;
    transition: opacity 180ms ease;
    z-index: 0;
  }

  #screen-home .home-card > * {
    position: relative;
    z-index: 1;
  }

  #screen-home .home-card:active {
    transform: scale(0.97);
  }

  #screen-home .home-card.is-interacting,
  #screen-home .home-card:hover {
    box-shadow: 0 10px 28px rgba(20,40,60,0.12);
  }

  #screen-home .home-card.is-interacting::before,
  #screen-home .home-card:hover::before {
    opacity: 1;
  }

  #screen-home .home-card--wide {
    grid-column: 1 / -1;
  }

  #screen-home .home-card--mock {
    min-height: 128px;
  }

  #screen-home .home-card--small {
    min-height: 108px;
  }

  #screen-home .home-card--speaking {
    min-height: 108px;
  }

  #screen-home .home-card-icon-wrap {
    width: 42px;
    height: 42px;
    border-radius: 14px;
    background: rgba(0,186,255,0.12);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
  }

  #screen-home .home-card--mock .home-card-icon-wrap {
    width: 46px;
    height: 46px;
    border-radius: 16px;
  }

  #screen-home .home-card-icon {
    width: 20px;
    height: 20px;
    color: #00BAFF;
  }

  #screen-home .home-card-title {
    margin: 0;
    color: #17212B;
    font-size: 18px;
    font-weight: 900;
    line-height: 1.2;
  }

  #screen-home .home-card--mock .home-card-title {
    font-size: 22px;
    font-weight: 900;
  }

  #screen-home .home-card-subtitle {
    margin: 8px 0 0;
    color: #607080;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.35;
  }

  #screen-home .home-card-meta {
    margin: 8px 0 0;
    color: #8A98A6;
    font-size: 12px;
    font-weight: 700;
    line-height: 1.2;
  }

  #screen-home .home-card-arrow {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 18px;
    height: 18px;
    color: #8A98A6;
  }

  #screen-mocks .secondary-screen {
    margin: 0 auto;
    padding: 8px 12px 28px;
    width: 100%;
    max-width: 560px;
    background: #F5F9FC !important;
    box-sizing: border-box;
    min-height: 100%;
    text-align: left;
    font-family: Nunito, Manrope, system-ui, -apple-system, "Segoe UI", sans-serif;
    color: #17212B;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  #screen-mocks.container {
    max-width: 600px;
  }

  .secondary-header {
    padding: 8px 2px 2px;
    text-align: center;
  }

  .secondary-title {
    margin: 0;
    color: #17212B;
    font-size: 24px;
    font-weight: 900;
    line-height: 1.15;
    letter-spacing: 0;
    text-align: center;
  }

  .secondary-subtitle {
    margin: 7px 0 0;
    color: #607080;
    font-size: 14px;
    font-weight: 800;
    line-height: 1.3;
    text-align: center;
  }

  .secondary-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 2px;
  }

  .secondary-card {
    width: 100%;
    min-height: 82px;
    margin: 0;
    padding: 16px 18px;
    border: none;
    border-radius: 22px;
    background: #FFFFFF;
    color: #17212B;
    box-shadow: 0 8px 24px rgba(20,40,60,0.08);
    display: grid;
    grid-template-columns: 48px minmax(0, 1fr) 18px;
    align-items: center;
    gap: 12px;
    text-align: left;
    cursor: pointer;
    transition: transform 180ms ease, box-shadow 180ms ease;
    -webkit-tap-highlight-color: transparent;
  }

  .secondary-card:active {
    transform: scale(0.98);
  }

  .secondary-card:hover {
    box-shadow: 0 10px 28px rgba(20,40,60,0.12);
  }

  .secondary-card-icon {
    width: 46px;
    height: 46px;
    border-radius: 15px;
    background: rgba(0,186,255,0.12);
    color: #00BAFF;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .secondary-card-icon svg {
    width: 22px;
    height: 22px;
  }

  .secondary-card-title {
    margin: 0;
    color: #17212B;
    font-size: 16px;
    font-weight: 900;
    line-height: 1.2;
    display: block;
    overflow-wrap: anywhere;
  }

  .secondary-card-subtitle {
    margin: 5px 0 0;
    color: #607080;
    font-size: 12px;
    font-weight: 800;
    line-height: 1.25;
  }

  .secondary-card-chevron {
    width: 18px;
    height: 18px;
    color: #8A98A6;
  }

  .secondary-state {
    margin: 0;
    padding: 18px 16px;
    border-radius: 22px;
    background: #FFFFFF;
    box-shadow: 0 8px 24px rgba(20,40,60,0.08);
    color: #607080;
    font-size: 14px;
    font-weight: 800;
    line-height: 1.35;
    text-align: center;
  }

  .secondary-state--error {
    color: #C83E3E;
  }

  .secondary-back {
    position: sticky;
    bottom: calc(28px + env(safe-area-inset-bottom, 0px));
    z-index: 140;
    width: auto;
    min-width: 104px;
    height: 48px;
    margin: auto 0 0;
    padding: 0 18px;
    border-radius: 18px;
    background: #f4f4f6;
    color: #111;
    box-shadow: 0 5px 14px rgba(0,0,0,0.16);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 16px;
    font-weight: 900;
  }

  .secondary-back svg {
    width: 20px;
    height: 20px;
    flex: 0 0 auto;
  }

  #screen-home .home-admin-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #screen-home .home-admin-btn {
    border-radius: 18px;
    border: none;
    background: #FFFFFF;
    color: #17212B;
    font-size: 14px;
    font-weight: 800;
    height: 44px;
    padding: 0 14px;
    text-align: left;
    cursor: pointer;
    margin: 0;
    box-shadow: 0 8px 24px rgba(20,40,60,0.08);
  }

  #screen-home .home-admin-btn:active {
    transform: scale(0.97);
  }

  #screen-reading,
  #screen-writing,
  #screen-speaking {
    max-width: 100% !important;
    width: 100% !important;
    padding: 0 !important;
    box-sizing: border-box;

  <script>
    (function setupHomeCardGlow() {
      function updateCardPoint(card, clientX, clientY) {
        const rect = card.getBoundingClientRect();
        const x = Math.max(0, Math.min(rect.width, clientX - rect.left));
        const y = Math.max(0, Math.min(rect.height, clientY - rect.top));
        card.style.setProperty("--x", `${x}px`);
        card.style.setProperty("--y", `${y}px`);
      }

      function attachGlow(card) {
        if (!card || card.dataset.glowBound === "1") return;
        card.dataset.glowBound = "1";

        card.addEventListener("pointerenter", (event) => {
          card.classList.add("is-interacting");
          updateCardPoint(card, event.clientX, event.clientY);
        });

        card.addEventListener("pointermove", (event) => {
          updateCardPoint(card, event.clientX, event.clientY);
        });

        card.addEventListener("pointerleave", () => {
          card.classList.remove("is-interacting");
        });

        card.addEventListener("touchstart", (event) => {
          const t = event.touches && event.touches[0];
          if (!t) return;
          card.classList.add("is-interacting");
          updateCardPoint(card, t.clientX, t.clientY);
        }, { passive: true });

        card.addEventListener("touchmove", (event) => {
          const t = event.touches && event.touches[0];
          if (!t) return;
          updateCardPoint(card, t.clientX, t.clientY);
        }, { passive: true });

        card.addEventListener("touchend", () => {
          card.classList.remove("is-interacting");
        }, { passive: true });

        card.addEventListener("touchcancel", () => {
          card.classList.remove("is-interacting");
        }, { passive: true });
      }

      document.querySelectorAll("#screen-home .home-card").forEach(attachGlow);
    })();
  </script>
