<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="stylesheet" href="js/user_reading/ui/passage_view.css">
  <link rel="stylesheet" href="js/user_reading/ui/question_base.css">
  <link rel="stylesheet" href="js/user_reading/question_types/gap.css">
  <link rel="stylesheet" href="js/user_reading/question_types/tfng.css">
  <link rel="stylesheet" href="js/user_reading/question_types/matching.css">
  <title>Voxi Mini App</title>
  
  <style>
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overscroll-behavior: none;
  }

  /* apply touch-action ONLY for mobile UI elements, not global */
  .app {
    touch-action: manipulation;
  }

  :root {
    --bg-color: #ffffff;
    --text-color: #000000;
    --card-bg: #f4f4f6;
    --border-color: #e5e5ea;
    --primary: #4f46e5;
  }

  body {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
  }


  .container {
    width: 100%;
    max-width: 320px;
    height: 100%;
    text-align: center;
    display: flex;
    flex-direction: column;
    margin: 0 auto;         
    box-sizing: border-box;
  }
  input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    outline: none;
    margin-top: 10px;
  }

  button {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: var(--primary);
    color: var(--text-color);
  }

  #status {
    margin-top: 12px;
    font-size: 14px;
    opacity: 0.85;
  }

  .app {
  height: 100%;
  width: 100%;
  max-width: 100%;
  display: flex;
  flex-direction: column;
}

.header {
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  border-bottom: 1px solid var(--border-color);
}

.announcement {
  margin: 12px 0;
  padding: 0;
  background: transparent;
  border: none;
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

#announcement-img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 16px;
}

#announcement-text {
  display: none;
}

.content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;      
  padding: 12px 16px;     
  box-sizing: border-box; 
}
.primary-btn {
  margin-top: 24px;
  height: 56px;
  font-size: 16px;
  font-weight: 700;
  border-radius: 14px;
  background: #ffffff;
  color: #000000;
  border: 1.5px solid #e5e5ea;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}


.bottom-nav {
  height: 56px;
  display: flex;
  align-items: center;
  border-top: 1px solid var(--border-color);
  background: var(--bg-color);
}

.nav-btn {
  flex: 1;
  height: 100%;
  border: none;
  background: transparent;
  color: white;
  font-size: 18px;
}

.nav-btn.active {
  color: var(--primary);
}

.divider {
  width: 1px;
  height: 60%;
  background: var(--border-color);
}
.form {
  width: 100%;
  max-width: 320px;
  margin: 0 auto;
}
input, button {
  box-sizing: border-box;
}
.nav-icon {
  width: 22px;
  height: 22px;
  opacity: 0.7;
  transition: opacity 0.15s ease, transform 0.15s ease;
}

.nav-btn.active .nav-icon {
  opacity: 1;
  transform: scale(1.1);
}

#screen-reading {
  max-width: 100% !important;
  width: 100% !important;
  padding: 0 !important;
}

#screen-reading.container {
  max-width: 100% !important;
  width: 100% !important;
}

#screen-reading {
  max-width: 100% !important;
  width: 100% !important;
  padding: 0 !important;
  padding-left: 2px;
  padding-right: 2px;
  box-sizing: border-box;
}
.header,
.bottom-nav,
.divider,
.announcement,
.primary-btn,
button {
  border: none !important;
}

* {
  outline: none;
}

.primary-btn {
  box-shadow: 0 4px 10px rgba(0,0,0,0.08) !important;
}
</style>

</head>
<body>

  <div class="app">

    <div class="announcement" id="announcement" style="display:none;">
      <img id="announcement-img" src="./assets/coming_soon.png" />
    </div>

    <div class="content" id="content">

      <div class="container" id="screen-name" style="display:none;">
        <div class="form"> 
          <h3>Enter your name</h3>
          <input id="name" placeholder="Your name" />
          <button id="saveBtn">Save</button>
          <p id="status"></p>
        </div>
      </div>

      <div class="container" id="screen-home">
        <button class="primary-btn" onclick="showMocksScreen()">🧠 IELTS Mock Test</button>

        <button class="primary-btn" id="adminBtn" style="display:none; margin-top:12px;" onclick="showAdminPanel()">
          🛠 Admin Panel
        </button>
      </div>


      <div class="container" id="screen-profile" style="display:none;"></div>


      <div class="container" id="screen-mocks" style="display:none;"></div>

      <div class="container" id="screen-admin" style="display:none;">
        <h3>Admin Panel</h3>

        <button class="primary-btn" id="btn-db-stats">
          📊 Database stats
        </button>

        <button class="primary-btn" id="btn-mock-packs" style="margin-top:12px;">
          📦 MOCK Packs
        </button>
      </div>
      
      <div class="container" id="screen-reading" style="display:none;"></div>


    </div>

    <div class="bottom-nav">
      <button class="nav-btn active" id="btn-home">
        <img src="./assets/home.png" alt="Home" class="nav-icon" />
      </button>
      <div class="divider"></div>
      <button class="nav-btn" id="btn-profile">
        <img src="./assets/profile.png" alt="Profile" class="nav-icon" />
      </button>

    </div>

  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/screens.js?v=4"></script>
  <script src="js/mock_list.js"></script>
  <script src="js/user_reading/ui/header.js"></script>
  <script src="js/user_reading/ui/marking_ios.js"></script>
  <script src="js/user_reading/static.js"></script>
  <script src="js/user_reading/ui/passage_view.js"></script>
  <script src="js/user_reading/ui/question_view.js"></script>
  <script src="js/user_reading/question_types/gap.js"></script>
  <script src="js/user_reading/question_types/tfng.js"></script>
  <script src="js/user_reading/question_types/matching.js"></script>
  <script src="js/user_reading/dynamic.js"></script>
  <script src="js/mock_start.js"></script>
  <script src="./js/admin_mock_packs.js?v=1"></script>
  <script src="/js/admin_reading/core/state.js"></script>
  <script src="/js/admin_reading/core/utils.js"></script>
  <script src="/js/admin_reading/question_types/gate.js"></script>
  <script src="/js/admin_reading/question_types/options.js"></script>
  <script src="/js/admin_reading/question_types/matching/ui.js"></script>
  <script src="/js/admin_reading/question_types/matching/logic.js"></script>
  <script src="/js/admin_reading/question_types/matching/render.js"></script>
  <script src="/js/admin_reading/question_types/paragraph_matching/ui.js"></script>
  <script src="/js/admin_reading/question_types/paragraph_matching/logic.js"></script>
  <script src="/js/admin_reading/question_types/paragraph_matching/render.js"></script>
  <script src="/js/admin_reading/question_types/paragraph_matching/serializer.js"></script>
  <script src="/js/admin_reading/question_types/single_choice/ui.js"></script>
  <script src="/js/admin_reading/question_types/single_choice/logic.js"></script>
  <script src="/js/admin_reading/question_types/single_choice/render.js"></script>
  <script src="/js/admin_reading/question_types/gap/ui.js"></script>
  <script src="/js/admin_reading/question_types/gap/logic.js"></script>
  <script src="/js/admin_reading/question_types/gap/render.js"></script>
  <script src="/js/admin_reading/question_types/gap/serializer.js"></script>
  <script src="/js/admin_reading/question_types/ynng/ui.js"></script>
  <script src="/js/admin_reading/question_types/ynng/logic.js"></script>
  <script src="/js/admin_reading/question_types/ynng/render.js"></script>
  <script src="/js/admin_reading/question_types/ynng/serializer.js"></script>
  <script src="/js/admin_reading/question_types/tfng/ui.js"></script>
  <script src="/js/admin_reading/question_types/tfng/logic.js"></script>
  <script src="/js/admin_reading/question_types/tfng/render.js"></script>
  <script src="/js/admin_reading/question_types/tfng/serializer.js"></script>
  <script src="/js/admin_reading/question_types/multiple_choice/ui.js"></script>
  <script src="/js/admin_reading/question_types/multiple_choice/logic.js"></script>
  <script src="/js/admin_reading/question_types/multiple_choice/render.js"></script>
  <script src="/js/admin_reading/question_types/multiple_choice/serializer.js"></script>
  <script src="/js/admin_reading/question_types/summary/ui.js"></script>
  <script src="/js/admin_reading/question_types/summary/logic.js"></script>
  <script src="/js/admin_reading/question_types/summary/render.js"></script>
  <script src="/js/admin_reading/question_types/summary/serializer.js"></script>
  <script src="/js/admin_reading/ui/images.js"></script>
  <script src="/js/admin_reading/ui/passages.js?v=2"></script>
  <script src="/js/admin_reading/ui/editor.js"></script>
  <script src="/js/admin_reading/api/reading_api.js"></script>
  <script src="/js/admin_reading/loader/editor_loader.js"></script>
  <script src="./js/admin_mock.js?v=1"></script>
  <script src="./js/app.js"></script>

</body>

</html>
